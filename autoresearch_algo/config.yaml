# =============================================================================
# ONVOX/TONES Configuration
# =============================================================================
# Single source of truth for all paths, parameters, and participant configs.
# All paths are relative to the project root (base_dir).

# Base directory — override with TONES_BASE_DIR environment variable
base_dir: /Users/tonesonvox/Projects/voice_glucose_analyzer/TONES

# -----------------------------------------------------------------------------
# Data Matching
# -----------------------------------------------------------------------------
matching:
  window_minutes: 30         # Max time difference between audio and CGM reading
  use_interpolation: true    # Linear interpolation between bracketing CGM readings
  min_audio_duration_sec: 0.5  # Skip audio files shorter than this

# -----------------------------------------------------------------------------
# Feature Extraction
# -----------------------------------------------------------------------------
features:
  sample_rate: 16000
  # MFCC settings (based on hyperparameter optimization results)
  n_mfcc: 20
  n_mels: 64
  fmin: 50
  fmax: 8000
  use_deltas: true
  use_delta_deltas: true
  # Windowed extraction
  window_ms: 1000
  hop_ratio: 0.5
  # Feature caching
  cache_dir: ".cache/features"
  use_cache: true

  # Within-speaker normalization (Phase 1A)
  # Options: "zscore", "running_zscore", "rank", "none"
  normalization: "zscore"
  normalization_window: 20      # Window size for running_zscore
  normalization_min_history: 5  # Minimum history for running_zscore

  # Voice quality features (Phase 1B)
  use_voice_quality: true      # Jitter, shimmer, tremor, formants, HNR, CPP. Zero-vector fallback on pYIN failure.

  # Temporal context features (Phase 1C)
  use_temporal: true            # Add circadian + delta + time-since features
  temporal_max_gap_hours: 4.0   # Max gap for delta computation
  use_rolling_stats: false      # Rolling mean/std (increases feature dim significantly)

# -----------------------------------------------------------------------------
# Models
# -----------------------------------------------------------------------------
models:
  # Personalized model settings
  personalized:
    primary_model: SVR        # Best for personalized (from hyperparameter analysis)
    cv_strategy: loo          # Leave-One-Out for small datasets
    cv_kfold_splits: 10       # Used when n_samples > 50
    min_samples: 20           # Minimum samples to train a personalized model
  # Population model settings
  population:
    primary_model: BayesianRidge  # Best for population/cold-start
    cv_strategy: lopo             # Leave-One-Person-Out
  # Model hyperparameters
  svr:
    kernel: rbf
    C: 10
    gamma: scale
  bayesian_ridge: {}  # Uses sklearn defaults
  random_forest:
    n_estimators: 100
    max_depth: 10
    random_state: 42
  gradient_boosting:
    n_estimators: 100
    max_depth: 5
    random_state: 42
  knn:
    n_neighbors: 5
    weights: distance

  # Novel strategies (Phase 2+3)
  strategies:
    # Phase 2A: Deviation-from-personal-mean regression
    use_deviation_target: true

    # Phase 2B: Rate-of-change classification
    use_rate_classification: true
    rate_threshold: 1.0         # mg/dL/min threshold for rising/falling

    # Phase 2C: Regime classification
    use_regime_classification: true

    # Phase 3A: Hierarchical Bayesian model
    use_hierarchical_bayesian: true
    bayesian_backend: "empirical"  # "pymc" or "empirical" (fallback)

    # Phase 3B: Few-shot calibration evaluation
    use_few_shot_calibration: true
    calibration_samples: 10
    calibration_strategy: "linear"  # "bias", "linear", "feature_based"

    # Phase 3C: Diverse ensemble
    use_ensemble: true

    # Temporal validation (Phase 0A)
    use_temporal_validation: true
    temporal_train_fraction: 0.7

# -----------------------------------------------------------------------------
# Output
# -----------------------------------------------------------------------------
output:
  dir: "output"
  save_models: true
  save_visualizations: true
  report_format: html

# -----------------------------------------------------------------------------
